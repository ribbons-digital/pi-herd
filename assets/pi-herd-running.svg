<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">pi-herd running in Herdr</title>
  <desc id="desc">Illustration of a pi-herd run with one lead session and visible planner, implementer, reviewer, and tester worker panes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="pane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect x="38" y="34" width="1324" height="752" rx="28" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="38" y="34" width="1324" height="70" rx="28" fill="#111827"/>
    <circle cx="76" cy="70" r="8" fill="#f87171"/>
    <circle cx="104" cy="70" r="8" fill="#fbbf24"/>
    <circle cx="132" cy="70" r="8" fill="#34d399"/>
    <text x="174" y="77" fill="#e5e7eb" font-size="23" font-weight="700">Herdr workspace: pi-herd</text>
    <text x="1170" y="77" fill="#93c5fd" font-size="16" font-weight="600">run active</text>

    <g transform="translate(70 130)">
      <rect width="1260" height="604" rx="18" fill="#020617" stroke="#1f2937"/>
      <line x1="520" y1="0" x2="520" y2="604" stroke="#1f2937" stroke-width="2"/>
      <line x1="520" y1="302" x2="1260" y2="302" stroke="#1f2937" stroke-width="2"/>
      <line x1="890" y1="302" x2="890" y2="604" stroke="#1f2937" stroke-width="2"/>

      <g transform="translate(20 20)">
        <rect width="480" height="564" rx="14" fill="url(#pane)" stroke="#2563eb" stroke-width="2"/>
        <rect width="480" height="42" rx="14" fill="#1e3a8a"/>
        <text x="18" y="28" fill="#dbeafe" font-size="16" font-weight="700">lead session</text>
        <text x="360" y="28" fill="#bfdbfe" font-size="13">Pi</text>
        <text x="22" y="76" fill="#e5e7eb" font-size="19" font-weight="700">You steer the run here.</text>
        <text x="22" y="112" fill="#94a3b8" font-size="15">$ pi-herd lead status</text>
        <text x="22" y="146" fill="#cbd5e1" font-size="15">Run: auth-refresh</text>
        <text x="22" y="178" fill="#cbd5e1" font-size="15">planner: done, PLAN.md valid</text>
        <text x="22" y="210" fill="#cbd5e1" font-size="15">implementer: working</text>
        <text x="22" y="242" fill="#cbd5e1" font-size="15">reviewer: staged</text>
        <text x="22" y="274" fill="#cbd5e1" font-size="15">tester: staged</text>
        <rect x="22" y="322" width="436" height="78" rx="10" fill="#0f172a" stroke="#334155"/>
        <text x="42" y="352" fill="#93c5fd" font-size="15">pi-herd send implementer</text>
        <text x="42" y="380" fill="#e5e7eb" font-size="15">&quot;Implement the approved plan.&quot;</text>
        <text x="22" y="462" fill="#94a3b8" font-size="15">Artifacts collect into .pi-herd/runs/...</text>
        <text x="22" y="494" fill="#94a3b8" font-size="15">Use collect and merge-plan when ready.</text>
      </g>

      <g transform="translate(545 20)">
        <rect width="695" height="260" rx="14" fill="url(#pane)" stroke="#475569"/>
        <rect width="695" height="42" rx="14" fill="#312e81"/>
        <text x="18" y="28" fill="#ddd6fe" font-size="16" font-weight="700">planner</text>
        <text x="604" y="28" fill="#c4b5fd" font-size="13">done</text>
        <text x="22" y="78" fill="#e5e7eb" font-size="17" font-weight="700">Writes PLAN.md</text>
        <text x="22" y="114" fill="#cbd5e1" font-size="15">Breaks the goal into small implementation steps.</text>
        <text x="22" y="146" fill="#cbd5e1" font-size="15">Leaves durable notes in the shared run directory.</text>
        <rect x="22" y="186" width="650" height="42" rx="8" fill="#0f172a" stroke="#334155"/>
        <text x="40" y="213" fill="#a7f3d0" font-size="15">PLAN.md ready</text>
      </g>

      <g transform="translate(545 322)">
        <rect width="325" height="262" rx="14" fill="url(#pane)" stroke="#475569"/>
        <rect width="325" height="42" rx="14" fill="#065f46"/>
        <text x="18" y="28" fill="#d1fae5" font-size="16" font-weight="700">implementer</text>
        <text x="234" y="28" fill="#a7f3d0" font-size="13">working</text>
        <text x="22" y="78" fill="#e5e7eb" font-size="17" font-weight="700">Own worktree</text>
        <text x="22" y="114" fill="#cbd5e1" font-size="15">Edits source safely away</text>
        <text x="22" y="142" fill="#cbd5e1" font-size="15">from the lead checkout.</text>
        <text x="22" y="190" fill="#94a3b8" font-size="14">.worktrees/pi-herd/.../implementer</text>
      </g>

      <g transform="translate(910 322)">
        <rect width="150" height="262" rx="14" fill="url(#pane)" stroke="#475569"/>
        <rect width="150" height="42" rx="14" fill="#7c2d12"/>
        <text x="16" y="28" fill="#fed7aa" font-size="16" font-weight="700">reviewer</text>
        <text x="22" y="78" fill="#e5e7eb" font-size="15" font-weight="700">lazy</text>
        <text x="22" y="110" fill="#cbd5e1" font-size="14">Activates</text>
        <text x="22" y="136" fill="#cbd5e1" font-size="14">when sent</text>
        <text x="22" y="162" fill="#cbd5e1" font-size="14">work.</text>
      </g>

      <g transform="translate(1080 322)">
        <rect width="160" height="262" rx="14" fill="url(#pane)" stroke="#475569"/>
        <rect width="160" height="42" rx="14" fill="#581c87"/>
        <text x="16" y="28" fill="#e9d5ff" font-size="16" font-weight="700">tester</text>
        <text x="22" y="78" fill="#e5e7eb" font-size="15" font-weight="700">lazy</text>
        <text x="22" y="110" fill="#cbd5e1" font-size="14">Runs checks</text>
        <text x="22" y="136" fill="#cbd5e1" font-size="14">and writes</text>
        <text x="22" y="162" fill="#cbd5e1" font-size="14">TEST_REPORT.md</text>
      </g>
    </g>

    <text x="70" y="775" fill="#94a3b8" font-size="15">Illustrative running view: pi-herd keeps every worker visible in Herdr panes while artifacts and state stay durable in the repo.</text>
  </g>
</svg>
